name: CI

on:
  pull_request:
    branches: [develop]

  push:
    branches: [develop]

jobs:
  build-test-docker:
    runs-on: ubuntu-latest

    steps:
      # -------------------------
      # Checkout
      # -------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # -------------------------
      # Java setup
      # -------------------------
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      # -------------------------
      # Cache Maven
      # -------------------------
      - name: Cache Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: maven-${{ hashFiles('**/pom.xml') }}

      # -------------------------
      # 1. Unit Tests (JUnit)
      # -------------------------
      - name: Run unit tests
        run: ./mvnw clean test

      # -------------------------
      # 2. Build JAR (sin tests)
      # -------------------------
      - name: Build JAR
        run: ./mvnw package -DskipTests

      # -------------------------
      # 4. Crear .env para CI
      # -------------------------
      - name: Create .env
        run: |
          cat <<EOF > .env
          MARIADB_ROOT_PASSWORD=root
          MARIADB_DATABASE=agenda
          MARIADB_USER=agenda_user
          MARIADB_PASSWORD=agenda_password
          SPRING_APPLICATION_NAME=adulto-funcional
          JWT_SECRET=ci-secret
          JWT_EXPIRATION=86400000
          EOF

      # -------------------------
      # 5. Levantar entorno completo
      # -------------------------
      - name: Install curl
        run: sudo apt-get update && sudo apt-get install -y curl
      
      - name: Verify Docker
        run: docker version

      - name: Verify Docker Compose
        run: docker compose version
        
      - name: Start docker-compose
        run: docker compose up -d

      # -------------------------
      # 6. Esperar a que todo esté sano
      # -------------------------      
      - name: Wait for healthcheck
        run: |
          for i in {1..20}; do
            if curl -f http://localhost/health; then
              echo "Sistema OK"
              exit 0
            fi
            echo "Esperando servicios..."
            sleep 5
          done

          echo "Fallo: servicios no saludables"
          docker compose logs
          exit 1

      # -------------------------
      # 7. Cleanup
      # -------------------------
      - name: Shutdown
        if: always()
        run: docker compose down -v
