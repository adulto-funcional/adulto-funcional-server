# Configuración para tests con Testcontainers/MariaDB
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect

# Desactivar Flyway en tests
spring.flyway.enabled=false

# Hikari - evitar warnings al cerrar el contenedor
spring.datasource.hikari.max-lifetime=30000

jwt.secret=your-test-secret-key-must-be-at-least-32-characters-long-for-hs256
jwt.expiration=86400000

CORS_ALLOWED_ORIGINS=http://localhost:3000

COOKIE_SECURE=false
APP_COOKIE_SECURE=true
APP_COOKIE_SAME_SITE=Lax
